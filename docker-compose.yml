# Postgres para desarrollo local. En producción se usa Railway.
services:
  postgres:
    image: postgres:16-alpine
    container_name: marisa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marisa
    ports:
      - '5432:5432'
    volumes:
      - marisa-pgdata:/var/lib/postgresql/data

volumes:
  marisa-pgdata:

<div class="login-wrap">
  <mat-card class="login-card">
    @if (loading()) {
      <mat-progress-bar mode="indeterminate" />
    }
    <mat-card-content>
      <div class="logo">
        <mat-icon>factory</mat-icon>
      </div>
      <h1>Gestión de Producción y Nómina</h1>
      <p class="subtitle">Ingresá tus credenciales para continuar</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            [type]="hide() ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hide.set(!hide())"
            [attr.aria-label]="'Mostrar contraseña'"
          >
            <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <button
          mat-flat-button
          color="primary"
          class="full-width submit"
          type="submit"
          [disabled]="loading() || form.invalid"
        >
          Ingresar
        </button>
      </form>

      <p class="hint">Demo: admin / Admin123! · operario / Operario123!</p>
    </mat-card-content>
  </mat-card>
</div>
